name: Weekly Grocery Specials

on:
  schedule:
    # Every Thursday at 8:00 AM Eastern (13:00 UTC)
    - cron: '0 13 * * 4'
  workflow_dispatch:   # allows manual trigger from GitHub UI

permissions:
  contents: write      # needed to push dist/ to gh-pages branch

jobs:
  scrape-and-send:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY:    ${{ secrets.RESEND_API_KEY }}
          FROM_EMAIL:        ${{ secrets.FROM_EMAIL }}
          TO_EMAILS:         ${{ secrets.TO_EMAILS }}
          SITE_URL:          "https://${{ github.repository_owner }}.github.io/hamilton-specials/"
        run: python scraper.py

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          commit_message: "chore: weekly specials ${{ github.run_id }}"
